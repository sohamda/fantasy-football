# Development Profile Configuration

# Spring AI Configuration (Development)
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-test-key}
spring.ai.openai.chat.options.model=gpt-4-vision-preview
spring.ai.openai.chat.options.temperature=0.1
spring.ai.openai.chat.options.max-tokens=1000

# Azure Cosmos DB Configuration (Development)
azure.cosmos.uri=${COSMOS_DB_URI:https://localhost:8081}
azure.cosmos.key=${COSMOS_DB_KEY:C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jk==}
azure.cosmos.database=${COSMOS_DB_DATABASE:fantasy-football-dev}

# Development server configuration
server.port=8081
server.servlet.context-path=/

# Logging Configuration (Development)
logging.level.root=INFO
logging.level.com.fantasyfootball.playerextraction=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.com.azure.cosmos=INFO
logging.level.org.springframework.web=DEBUG

# Enable development features
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Actuator endpoints for monitoring
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always

# Jackson configuration for better JSON handling
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Multipart configuration for larger test files
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB